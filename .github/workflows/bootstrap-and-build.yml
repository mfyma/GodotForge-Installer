name: Upgrade Full Storage Access and Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  upgrade-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Apply full-storage-access patch
        shell: bash
        run: |
          set -euo pipefail

          PATCH="GodotForge_Installer_FullAccess_Patch.zip"
          if [[ -f "$PATCH" ]]; then
            rm -rf /tmp/godotforge-full-access
            mkdir -p /tmp/godotforge-full-access
            unzip -q "$PATCH" -d /tmp/godotforge-full-access
            cp -a /tmp/godotforge-full-access/app/. app/
            rm -f "$PATCH"

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Add optional full storage access and direct path mode" || true
            git push
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Test and build Debug APK
        run: ./gradlew --no-daemon testDebugUnitTest assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GodotForge-Installer-full-access-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
