name: Bootstrap and Build GodotForge Installer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Repair Gradle wrapper JAR
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL             https://raw.githubusercontent.com/gradle/gradle/v8.9.0/gradle/wrapper/gradle-wrapper.jar             -o gradle/wrapper/gradle-wrapper.jar

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add gradle/wrapper/gradle-wrapper.jar
          git commit -m "Repair Gradle wrapper JAR" || true
          git push

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Test and build Debug APK
        run: ./gradlew --no-daemon testDebugUnitTest assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GodotForge-Installer-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
