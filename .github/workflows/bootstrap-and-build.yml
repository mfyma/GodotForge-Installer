name: Bootstrap and Build GodotForge Installer

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Import Android project from ZIP
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f GodotForge_Installer.zip ]]; then
            rm -rf /tmp/godotforge-import
            mkdir -p /tmp/godotforge-import
            unzip -q GodotForge_Installer.zip -d /tmp/godotforge-import

            if [[ -d /tmp/godotforge-import/GodotForge_Installer ]]; then
              SOURCE=/tmp/godotforge-import/GodotForge_Installer
            else
              SOURCE=/tmp/godotforge-import
            fi

            shopt -s dotglob nullglob
            cp -a "$SOURCE"/* .
            rm -f GodotForge_Installer.zip

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "Import complete Android project" || true
            git push
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Test and build Debug APK
        run: ./gradlew --no-daemon testDebugUnitTest assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: GodotForge-Installer-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
